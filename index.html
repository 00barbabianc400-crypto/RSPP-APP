<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSPP — Sistema Gestione DVR</title>
    
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Runtime ENV (generated from .env) -->
    <script src="./env.js"></script>
    
    <!-- Fluent UI Web Components -->
    <script type="module" src="https://res.cdn.office.net/files/fabric-cdn-prod_20230815.002/office-ui-fabric-core/11.1.0/css/fabric.min.css"></script>
    
    <style>
        /* ════════════════════════════════════════════════════════════════
           RSPP App — Stile Fluent UI / SharePoint
           ════════════════════════════════════════════════════════════════ */
        
        :root {
            /* Palette Fluent UI / SharePoint */
            --sp-primary: #0078D4;
            --sp-primary-hover: #106EBE;
            --sp-primary-pressed: #005A9E;
            --sp-secondary: #2B88D8;
            --sp-bg: #FAF9F8;
            --sp-bg-card: #FFFFFF;
            --sp-bg-hover: #F3F2F1;
            --sp-border: #EDEBE9;
            --sp-border-strong: #D2D0CE;
            --sp-text: #323130;
            --sp-text-secondary: #605E5C;
            --sp-text-disabled: #A19F9D;
            --sp-success: #107C10;
            --sp-warning: #FFB900;
            --sp-error: #A4262C;
            --sp-shadow: 0 1.6px 3.6px 0 rgba(0,0,0,.132), 0 0.3px 0.9px 0 rgba(0,0,0,.108);
            --sp-shadow-elevated: 0 6.4px 14.4px 0 rgba(0,0,0,.132), 0 1.2px 3.6px 0 rgba(0,0,0,.108);
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, 'Helvetica Neue', sans-serif;
            font-size: 14px;
            color: var(--sp-text);
            background: var(--sp-bg);
            min-height: 100vh;
        }
        
        /* ───── HEADER ───── */
        .app-header {
            background: var(--sp-primary);
            color: white;
            padding: 0 24px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: var(--sp-shadow);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .app-header .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 16px;
            font-weight: 600;
        }
        
        .app-header .logo-icon {
            width: 32px;
            height: 32px;
            background: white;
            color: var(--sp-primary);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }
        
        .app-header .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 13px;
        }
        
        .app-header .user-avatar {
            width: 32px;
            height: 32px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
        }
        
        .app-header button {
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 6px 12px;
            border-radius: 2px;
            cursor: pointer;
            font-size: 13px;
            font-family: inherit;
        }
        
        .app-header button:hover {
            background: rgba(255,255,255,0.2);
        }
        
        /* ───── LAYOUT ───── */
        .app-layout {
            display: flex;
            min-height: calc(100vh - 48px);
        }
        
        .app-sidebar {
            width: 220px;
            background: var(--sp-bg-card);
            border-right: 1px solid var(--sp-border);
            padding: 16px 0;
            flex-shrink: 0;
        }
        
        .app-sidebar .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 16px;
            cursor: pointer;
            color: var(--sp-text);
            border-left: 3px solid transparent;
            transition: background 0.1s;
            font-size: 14px;
        }
        
        .app-sidebar .nav-item:hover {
            background: var(--sp-bg-hover);
        }
        
        .app-sidebar .nav-item.active {
            background: var(--sp-bg-hover);
            border-left-color: var(--sp-primary);
            font-weight: 600;
        }
        
        .app-sidebar .nav-icon {
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .app-sidebar .nav-section {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--sp-text-secondary);
            padding: 16px 16px 8px;
            letter-spacing: 0.5px;
        }
        
        .app-main {
            flex: 1;
            padding: 24px;
            overflow-x: auto;
        }
        
        /* ───── PAGINA ───── */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        
        .page-title {
            font-size: 24px;
            font-weight: 600;
            color: var(--sp-text);
        }
        
        .page-subtitle {
            font-size: 13px;
            color: var(--sp-text-secondary);
            margin-top: 4px;
        }
        
        /* ───── BUTTONS ───── */
        .btn {
            background: var(--sp-bg-card);
            color: var(--sp-text);
            border: 1px solid var(--sp-border-strong);
            padding: 6px 16px;
            border-radius: 2px;
            cursor: pointer;
            font-size: 14px;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            min-height: 32px;
            transition: all 0.1s;
        }
        
        .btn:hover {
            background: var(--sp-bg-hover);
        }
        
        .btn-primary {
            background: var(--sp-primary);
            color: white;
            border-color: var(--sp-primary);
        }
        
        .btn-primary:hover {
            background: var(--sp-primary-hover);
            border-color: var(--sp-primary-hover);
        }
        
        .btn-danger {
            color: var(--sp-error);
        }
        
        .btn-danger:hover {
            background: #FDE7E9;
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* ───── CARDS ───── */
        .card {
            background: var(--sp-bg-card);
            border: 1px solid var(--sp-border);
            border-radius: 4px;
            box-shadow: var(--sp-shadow);
            margin-bottom: 16px;
        }
        
        .card-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--sp-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .card-title {
            font-size: 16px;
            font-weight: 600;
        }
        
        .card-body {
            padding: 20px;
        }
        
        /* ───── TABELLA ───── */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            background: var(--sp-bg-card);
        }
        
        .data-table th {
            background: var(--sp-bg-hover);
            padding: 10px 12px;
            text-align: left;
            font-weight: 600;
            font-size: 13px;
            color: var(--sp-text);
            border-bottom: 1px solid var(--sp-border-strong);
            white-space: nowrap;
        }
        
        .data-table td {
            padding: 10px 12px;
            border-bottom: 1px solid var(--sp-border);
            font-size: 14px;
        }
        
        .data-table tbody tr {
            cursor: pointer;
            transition: background 0.1s;
        }
        
        .data-table tbody tr:hover {
            background: var(--sp-bg-hover);
        }
        
        .data-table .actions {
            display: flex;
            gap: 4px;
            justify-content: flex-end;
        }
        
        .icon-btn {
            background: transparent;
            border: none;
            color: var(--sp-text-secondary);
            padding: 4px 8px;
            border-radius: 2px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .icon-btn:hover {
            background: var(--sp-bg-hover);
            color: var(--sp-primary);
        }
        
        .icon-btn.danger:hover {
            color: var(--sp-error);
        }
        
        /* ───── FORM ───── */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }
        
        .form-grid.cols-1 {
            grid-template-columns: 1fr;
        }
        
        .form-grid.cols-3 {
            grid-template-columns: repeat(3, 1fr);
        }
        
        .form-section {
            grid-column: 1 / -1;
            margin-top: 8px;
            padding-top: 16px;
            border-top: 1px solid var(--sp-border);
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--sp-text-secondary);
            letter-spacing: 0.5px;
        }
        
        .form-section:first-child {
            border-top: none;
            padding-top: 0;
            margin-top: 0;
        }
        
        .form-field {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        
        .form-field.full {
            grid-column: 1 / -1;
        }
        
        .form-field label {
            font-size: 13px;
            font-weight: 600;
            color: var(--sp-text);
        }
        
        .form-field label .required {
            color: var(--sp-error);
        }
        
        .form-field input,
        .form-field select,
        .form-field textarea {
            padding: 6px 10px;
            border: 1px solid var(--sp-border-strong);
            border-radius: 2px;
            font-size: 14px;
            font-family: inherit;
            min-height: 32px;
            background: var(--sp-bg-card);
            color: var(--sp-text);
        }
        
        .form-field textarea {
            min-height: 80px;
            resize: vertical;
        }
        
        .form-field input:focus,
        .form-field select:focus,
        .form-field textarea:focus {
            outline: none;
            border-color: var(--sp-primary);
            border-width: 2px;
            padding: 5px 9px;
        }
        
        .form-field .hint {
            font-size: 12px;
            color: var(--sp-text-secondary);
        }
        
        /* ───── MODAL ───── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.2s, visibility 0.2s;
        }
        
        .modal-overlay.show {
            opacity: 1;
            visibility: visible;
        }
        
        .modal {
            background: var(--sp-bg-card);
            border-radius: 4px;
            box-shadow: var(--sp-shadow-elevated);
            width: 90%;
            max-width: 720px;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            transform: translateY(-10px);
            transition: transform 0.2s;
        }
        
        .modal-overlay.show .modal {
            transform: translateY(0);
        }
        
        .modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--sp-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .modal-title {
            font-size: 18px;
            font-weight: 600;
        }
        
        .modal-body {
            padding: 24px;
            overflow-y: auto;
            flex: 1;
        }
        
        .modal-footer {
            padding: 16px 24px;
            border-top: 1px solid var(--sp-border);
            display: flex;
            justify-content: flex-end;
            gap: 8px;
        }
        
        /* ───── LOGIN ───── */
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0078D4 0%, #005A9E 100%);
            padding: 20px;
        }
        
        .login-card {
            background: white;
            border-radius: 8px;
            box-shadow: var(--sp-shadow-elevated);
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            text-align: center;
        }
        
        .login-logo {
            width: 64px;
            height: 64px;
            background: var(--sp-primary);
            color: white;
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 24px;
        }
        
        .login-title {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .login-subtitle {
            font-size: 14px;
            color: var(--sp-text-secondary);
            margin-bottom: 32px;
        }
        
        .login-btn {
            width: 100%;
            padding: 12px;
            font-size: 15px;
            font-weight: 600;
        }
        
        /* ───── LOADING ───── */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            color: var(--sp-text-secondary);
            gap: 12px;
        }
        
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid var(--sp-border);
            border-top-color: var(--sp-primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* ───── EMPTY STATE ───── */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--sp-text-secondary);
        }
        
        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.4;
        }
        
        .empty-state h3 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--sp-text);
        }
        
        /* ───── TOAST ───── */
        .toast-container {
            position: fixed;
            top: 64px;
            right: 24px;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .toast {
            background: var(--sp-bg-card);
            border-left: 4px solid var(--sp-primary);
            padding: 12px 20px;
            border-radius: 2px;
            box-shadow: var(--sp-shadow-elevated);
            min-width: 280px;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: slideIn 0.2s;
        }
        
        .toast.success { border-left-color: var(--sp-success); }
        .toast.error { border-left-color: var(--sp-error); }
        .toast.warning { border-left-color: var(--sp-warning); }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        /* ───── BADGE ───── */
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 600;
            background: var(--sp-bg-hover);
            color: var(--sp-text);
        }
        
        .badge.success { background: #DFF6DD; color: var(--sp-success); }
        .badge.warning { background: #FFF4CE; color: #997B00; }
        .badge.error { background: #FDE7E9; color: var(--sp-error); }
        .badge.info { background: #DEECF9; color: var(--sp-primary); }
        
        /* ───── TOOLBAR ───── */
        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0 16px;
            gap: 12px;
        }
        
        .toolbar-search {
            flex: 1;
            max-width: 320px;
            position: relative;
        }
        
        .toolbar-search input {
            width: 100%;
            padding: 6px 10px 6px 32px;
            border: 1px solid var(--sp-border-strong);
            border-radius: 2px;
            font-size: 14px;
            font-family: inherit;
            min-height: 32px;
        }
        
        .toolbar-search::before {
            content: "🔍";
            position: absolute;
            left: 8px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 14px;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    
    <!-- ════════════════════════════════════════════════════════════════
         SCHERMATA LOGIN
         ════════════════════════════════════════════════════════════════ -->
    <div id="loginScreen" class="login-container">
        <div class="login-card">
            <div class="login-logo">RSPP</div>
            <h1 class="login-title">Sistema RSPP</h1>
            <p class="login-subtitle">Gestione Documentale DVR — D.Lgs. 81/08</p>
            <button class="btn btn-primary login-btn" onclick="signIn()">
                Accedi con Microsoft 365
            </button>
        </div>
    </div>
    
    <!-- ════════════════════════════════════════════════════════════════
         APP PRINCIPALE
         ════════════════════════════════════════════════════════════════ -->
    <div id="appContainer" style="display:none;">
        
        <!-- Header -->
        <header class="app-header">
            <div class="logo">
                <div class="logo-icon">R</div>
                <span>Sistema RSPP — Gestione DVR</span>
            </div>
            <div class="user-info">
                <span id="userDisplayName">Utente</span>
                <div class="user-avatar" id="userAvatar">U</div>
                <button onclick="signOut()">Esci</button>
            </div>
        </header>
        
        <!-- Layout principale -->
        <div class="app-layout">
            
            <!-- Sidebar -->
            <aside class="app-sidebar">
                <div class="nav-section" data-role-section="viewer">Anagrafica</div>
                <div class="nav-item active" onclick="navigateTo('aziende')" data-page="aziende" data-min-role="viewer">
                    <span class="nav-icon">🏢</span>
                    <span>Aziende</span>
                </div>
                <div class="nav-item" onclick="navigateTo('profili')" data-page="profili" data-min-role="viewer">
                    <span class="nav-icon">👥</span>
                    <span>Profili</span>
                </div>
                
                <div class="nav-section" data-role-section="viewer">Valutazioni</div>
                <div class="nav-item" onclick="navigateTo('valutazioni')" data-page="valutazioni" data-min-role="viewer">
                    <span class="nav-icon">⚖️</span>
                    <span>Valutazioni Rischi</span>
                </div>
                <div class="nav-item" onclick="navigateTo('rilevamenti')" data-page="rilevamenti" data-min-role="viewer">
                    <span class="nav-icon">📊</span>
                    <span>Rilevamenti</span>
                </div>
                
                <div class="nav-section" data-role-section="viewer">Configurazione</div>
                <div class="nav-item" onclick="navigateTo('rischi')" data-page="rischi" data-min-role="viewer">
                    <span class="nav-icon">⚠️</span>
                    <span>Catalogo Rischi</span>
                </div>
                <div class="nav-item" onclick="navigateTo('tipi')" data-page="tipi" data-min-role="viewer">
                    <span class="nav-icon">🧪</span>
                    <span>Tipi Rilevamento</span>
                </div>
                <div class="nav-item" onclick="navigateTo('testi')" data-page="testi" data-min-role="viewer">
                    <span class="nav-icon">📝</span>
                    <span>Testi DVR</span>
                </div>
                <div class="nav-item" onclick="navigateTo('admin')" data-page="admin" data-min-role="admin">
                    <span class="nav-icon">🔐</span>
                    <span>Admin Utenti</span>
                </div>
                
                <div class="nav-section" data-role-section="viewer">Output</div>
                <div class="nav-item" onclick="navigateTo('genera')" data-page="genera" data-min-role="viewer">
                    <span class="nav-icon">📄</span>
                    <span>Genera DVR</span>
                </div>
            </aside>
            
            <!-- Main content -->
            <main class="app-main" id="mainContent">
                <!-- Contenuto dinamico -->
            </main>
        </div>
    </div>
    
    <!-- Toast container -->
    <div class="toast-container" id="toastContainer"></div>
    
    <!-- ════════════════════════════════════════════════════════════════
         JAVASCRIPT
         ════════════════════════════════════════════════════════════════ -->
    <script>
        const RUNTIME_ENV = window.__ENV || {};

        const CONFIG = {
            supabaseUrl: RUNTIME_ENV.SUPABASE_URL || '',
            supabaseAnonKey: RUNTIME_ENV.SUPABASE_ANON_KEY || '',
            redirectTo: window.location.origin + window.location.pathname,
            tables: {
                aziende: 'aziende',
                profili: 'profili',
                catalogoRischi: 'catalogo_rischi',
                tipiRilevamento: 'tipi_rilevamento',
                aziendeProfili: 'aziende_profili',
                testiDVR: 'testi_dvr',
                valutazioniRischio: 'valutazioni_rischio',
                rilevamentiAmbientali: 'rilevamenti_ambientali',
                documentiCatalogo: 'documenti_catalogo',
                aziendeDocumenti: 'aziende_documenti'
            },
            TESTO_TRASCURABILE: 'Rischio non rilevato per il profilo professionale. Le caratteristiche dell\'attivita e dell\'ambiente di lavoro non comportano esposizione a tale tipologia di rischio.'
        };

        const STATE = {
            account: null,
            profile: null,
            role: 'viewer',
            currentPage: 'aziende',
            data: {
                aziende: [],
                profili: [],
                rischi: [],
                tipiRilevamento: [],
                aziendeProfili: [],
                testiDVR: [],
                valutazioniRischio: [],
                rilevamentiAmbientali: [],
                documentiCatalogo: [],
                aziendeDocumenti: []
            }
        };

        if (!window.supabase || !window.supabase.createClient) {
            throw new Error('Supabase JS non caricato');
        }

        if (!CONFIG.supabaseUrl || !CONFIG.supabaseAnonKey) {
            throw new Error('Config mancante: crea env.js da .env (SUPABASE_URL, SUPABASE_ANON_KEY)');
        }

        const supabaseClient = window.supabase.createClient(CONFIG.supabaseUrl, CONFIG.supabaseAnonKey, {
            auth: {
                persistSession: true,
                autoRefreshToken: true,
                detectSessionInUrl: true
            }
        });

        async function signIn() {
            const { error } = await supabaseClient.auth.signInWithOAuth({
                provider: 'azure',
                options: {
                    redirectTo: CONFIG.redirectTo,
                    scopes: 'openid profile email User.Read'
                }
            });
            if (error) {
                showToast('Errore login: ' + error.message, 'error');
            }
        }

        async function signOut() {
            await supabaseClient.auth.signOut();
            location.reload();
        }

        function normalizeRow(row) {
            return {
                id: row.id,
                fields: {
                    RagioneSociale: row.ragione_sociale,
                    PartitaIVA: row.partita_iva,
                    CodiceFiscale: row.codice_fiscale,
                    SedeOperativa: row.sede_operativa,
                    SedeLegale: row.sede_legale,

        async function ensureDocumentiCatalogoLoaded() {
            if ((STATE.data.documentiCatalogo || []).length > 0) return;
            const { data, error } = await supabaseClient
                .from(CONFIG.tables.documentiCatalogo)
                .select('*')
                .eq('attivo', true)
                .order('ordine', { ascending: true });
            if (error) throw error;
            STATE.data.documentiCatalogo = data || [];
        }

        async function loadAziendaDocumentiSelections(aziendaId) {
            if (!aziendaId) return [];
            const { data, error } = await supabaseClient
                .from(CONFIG.tables.aziendeDocumenti)
                .select('documento_id, selezionato')
                .eq('azienda_id', aziendaId);
            if (error) throw error;
            return data || [];
        }

        async function saveAziendaDocumentiSelections(aziendaId, selectedDocumentIds) {
            await ensureDocumentiCatalogoLoaded();
            const catalog = STATE.data.documentiCatalogo || [];
            if (!aziendaId || catalog.length === 0) return;

            const selectedSet = new Set(selectedDocumentIds || []);
            const rows = catalog.map(doc => ({
                azienda_id: aziendaId,
                documento_id: doc.id,
                selezionato: selectedSet.has(doc.id)
            }));

            const { error } = await supabaseClient
                .from(CONFIG.tables.aziendeDocumenti)
                .upsert(rows, { onConflict: 'azienda_id,documento_id' });
            if (error) throw error;
        }

        const ROLE_RANK = { viewer: 0, editor: 1, rspp: 2, admin: 3 };
        const PAGE_MIN_ROLE = {
            aziende: 'viewer',
            profili: 'viewer',
            valutazioni: 'viewer',
            rilevamenti: 'viewer',
            rischi: 'viewer',
            tipi: 'viewer',
            testi: 'viewer',
            genera: 'viewer',
            admin: 'admin'
        };

        function hasRequiredRole(requiredRole, currentRole = STATE.role) {
            if (!requiredRole) return true;
            return (ROLE_RANK[currentRole] ?? 0) >= (ROLE_RANK[requiredRole] ?? 0);
        }

        function isActiveProfile() {
            return !!STATE.profile?.is_active;
        }

        function canMutateData() {
            return isActiveProfile() && hasRequiredRole('editor');
        }

        async function loadCurrentProfile() {
            const { data, error } = await supabaseClient
                .from('profiles')
                .select('*')
                .eq('id', STATE.account.id)
                .maybeSingle();
            if (error) throw error;

            if (!data) {
                STATE.profile = null;
                STATE.role = 'viewer';
                return;
            }

            STATE.profile = data;
            STATE.role = data.role || 'viewer';
        }

        function applyRoleToNavigation() {
            document.querySelectorAll('.nav-item[data-min-role]').forEach(item => {
                const minRole = item.getAttribute('data-min-role');
                item.style.display = hasRequiredRole(minRole) ? '' : 'none';
            });
        }

        // INIZIALIZZAZIONE APP
        // ════════════════════════════════════════════════════════════════
        
        async function initApp() {
            try {
                // Mostra app
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('appContainer').style.display = 'block';
                
                // Info utente
                const account = STATE.account;
                const name = account.user_metadata?.full_name || account.user_metadata?.name || account.email;
                const initials = name.split(' ').map(s => s[0]).join('').substring(0, 2).toUpperCase();
                document.getElementById('userDisplayName').textContent = name;
                document.getElementById('userAvatar').textContent = initials;

                await loadCurrentProfile();
                applyRoleToNavigation();
                
                // Carica pagina iniziale
                if (!isActiveProfile()) {
                    await renderAccessPending(true);
                } else if (hasRequiredRole('viewer')) {
                    await navigateTo('aziende');
                } else {
                    await renderAccessPending(false);
                }
                
            } catch (error) {
                console.error('Init error:', error);
                showToast('Errore inizializzazione: ' + error.message, 'error');
            }
        }

        async function navigateTo(page) {
            const requiredRole = PAGE_MIN_ROLE[page];
            if (!isActiveProfile()) {
                await renderAccessPending(true);
                return;
            }
            if (requiredRole && !hasRequiredRole(requiredRole)) {
                await renderAccessPending(false);
                return;
            }
            STATE.currentPage = page;
            
            // Aggiorna sidebar
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            const activeItem = document.querySelector(`.nav-item[data-page="${page}"]`);
            if (activeItem) activeItem.classList.add('active');
            
            // Carica pagina
            const main = document.getElementById('mainContent');
            main.innerHTML = '<div class="loading"><div class="spinner"></div>Caricamento...</div>';
            
            try {
                switch(page) {
                    case 'aziende': await renderAziende(); break;
                    case 'profili': await renderProfili(); break;
                    case 'valutazioni': await renderValutazioni(); break;
                    case 'rilevamenti': await renderRilevamenti(); break;
                    case 'rischi': await renderCatalogoRischi(); break;
                    case 'tipi': await renderTipiRilevamento(); break;
                    case 'testi': await renderTestiDvr(); break;
                    case 'genera': await renderGeneraDvr(); break;
                    case 'admin': await renderAdminUsers(); break;
                    default: main.innerHTML = '<p>Pagina non trovata</p>';
                }
            } catch (error) {
                console.error('Navigation error:', error);
                main.innerHTML = `
                    <div class="card">
                        <div class="card-body" style="color: var(--sp-error);">
                            <strong>Errore:</strong> ${error.message}
                        </div>
                    </div>
                `;
            }
        }

                `<span class="badge ${getMacroBadgeClass(macroSettore)}">${macroSettore}</span>` : 
                '<span style="color: var(--sp-text-secondary)">—</span>';
            
            return `

                    <td><strong>${ragioneSociale || '—'}</strong></td>
                    <td>${f.PartitaIVA || '—'}</td>
                    <td>${f.CodiceATECO || '—'}</td>

                        </div>
                    </td>

            `;
        }
        
        function getMacroBadgeClass(macro) {
            switch(macro) {
                case 'Basso': return 'success';
                case 'Medio': return 'warning';
                case 'Alto': return 'error';
                default: return '';
            }
        }
        
        function filterAziende(query) {
            const tbody = document.getElementById('aziendeTableBody');
            if (!tbody) return;
            const q = query.toLowerCase().trim();
            const filtered = STATE.data.aziende.filter(item => {
                const f = item.fields;
                const ragioneSociale = f.RagioneSociale;
                return !q || 
                    (ragioneSociale || '').toLowerCase().includes(q) ||
                    (f.PartitaIVA || '').toLowerCase().includes(q);
            });
            tbody.innerHTML = filtered.map(item => renderAziendaRow(item)).join('');
        }

        async function saveAzienda(event, itemId) {
            if (!canMutateData()) {
                showToast('Permessi insufficienti: sola lettura', 'warning');
                return;
            }
            event.preventDefault();
            const form = event.target;
            const formData = new FormData(form);
            const data = {};
            const selectedDocumentIds = formData.getAll('documenti_selezionati');
            
            // Costruisci oggetto fields
            for (const [key, value] of formData.entries()) {
                if (value === '') continue;
                if (key === 'documenti_selezionati') continue;
                
                // Gestione tipi specifici
                if (['NumDipendenti', 'NumDipendentiDonne', 'NumDipendentiStranieri', 
                     'NumDipendentiTemporanei', 'Edizione', 'Revisione'].includes(key)) {
                    data[key] = parseInt(value);
                } else if (['TurniNotturni', 'SmartWorking'].includes(key)) {
                    data[key] = value === 'true';
                } else if (key.startsWith('Data')) {
                    data[key] = value;
                } else {
                    data[key] = value;
                }
            }
            const payload = aziendaPayloadFromForm(data);
            
            try {
                const submitBtn = document.querySelector('#aziendaModal .btn-primary');
                submitBtn.disabled = true;
                submitBtn.textContent = 'Salvataggio...';
                
                if (itemId) {
                    const { error } = await supabaseClient
                        .from(CONFIG.tables.aziende)
                        .update(payload)
                        .eq('id', itemId);
                    if (error) throw error;
                    await saveAziendaDocumentiSelections(itemId, selectedDocumentIds);
                    showToast('Azienda aggiornata con successo', 'success');
                } else {
                    const { data: insertedRows, error } = await supabaseClient
                        .from(CONFIG.tables.aziende)
                        .insert(payload)
                        .select('id');
                    if (error) throw error;
                    const aziendaId = insertedRows?.[0]?.id;
                    if (aziendaId) {
                        await saveAziendaDocumentiSelections(aziendaId, selectedDocumentIds);
                    }
                    showToast('Azienda creata con successo', 'success');
                }
                
                closeModal('aziendaModal');
                await renderAziende();
                
            } catch (error) {
                console.error('Save error:', error);
                showToast('Errore salvataggio: ' + error.message, 'error');
                const submitBtn = document.querySelector('#aziendaModal .btn-primary');
                if (submitBtn) {
                    submitBtn.disabled = false;
                    submitBtn.textContent = itemId ? 'Salva Modifiche' : 'Crea Azienda';
                }
            }
        }
        
        async function deleteAzienda(itemId) {
            if (!canMutateData()) {
                showToast('Permessi insufficienti: sola lettura', 'warning');
                return;
            }
            if (!confirm('Sei sicuro di voler eliminare questa azienda?\n\nATTENZIONE: l\'eliminazione è definitiva e rimuoverà anche tutte le valutazioni di rischio collegate.')) {
                return;
            }
            
            try {
                const { error } = await supabaseClient
                    .from(CONFIG.tables.aziende)
                    .delete()
                    .eq('id', itemId);
                if (error) throw error;
                showToast('Azienda eliminata', 'success');
                closeModal('aziendaModal');
                await renderAziende();
            } catch (error) {
                console.error('Delete error:', error);
                showToast('Errore eliminazione: ' + error.message, 'error');
            }
        }

        function normalizeProfiloRow(row) {

                    DescrizioneAttivita: row.descrizione_attivita,

                    MisureGenGenerali: row.misure_gen_generali,
                    DPIBase: row.dpi_base,
                    DPICollettivi: row.dpi_collettivi,
                    ProtocolloSorSan: row.protocollo_sor_san,
                    Attivo: row.attivo,
                    AziendaProprietariaId: row.azienda_proprietaria_id,
                    AziendaProprietariaNome: row.azienda_proprietaria?.ragione_sociale || ''
                }
            };
        }

        function profiloPayloadFromForm(data) {
            return {
                nome_profilo: data.NomeProfilo,
                tipo_personale: data.TipoPersonale,
                descrizione_attivita: data.DescrizioneAttivita,
                tipo_profilo: data.TipoProfilo,
                misure_gen_generali: data.MisureGenGenerali,
                dpi_base: data.DPIBase,
                dpi_collettivi: data.DPICollettivi,
                protocollo_sor_san: data.ProtocolloSorSan,
                attivo: data.Attivo,
                azienda_proprietaria_id: data.TipoProfilo === 'Custom' ? (data.AziendaProprietariaId || null) : null
            };
        }

        function normalizeAssociazioneRow(row) {
            return {
                id: row.id,
                azienda_id: row.azienda_id,
                profilo_id: row.profilo_id,
                fields: {
                    Azienda: row.azienda?.ragione_sociale || '—',
                    PartitaIVA: row.azienda?.partita_iva || '—',
                    Profilo: row.profilo?.nome_profilo || '—',
                    TipoProfilo: row.profilo?.tipo_profilo || '—',
                    DataAssociazione: row.data_associazione,
                    Note: row.note || ''
                }
            };

        async function ensureAziendeLoaded() {
            if ((STATE.data.aziende || []).length > 0) return;
            const { data, error } = await supabaseClient
                .from(CONFIG.tables.aziende)
                .select('id, ragione_sociale, partita_iva')
                .order('ragione_sociale', { ascending: true });
            if (error) throw error;
            STATE.data.aziende = (data || []).map(row => ({
                id: row.id,
                fields: {
                    RagioneSociale: row.ragione_sociale,
                    PartitaIVA: row.partita_iva
                }
            }));
        }

        async function loadProfiliAndAssociazioni() {
            await ensureAziendeLoaded();

            const { data: profiliData, error: profiliError } = await supabaseClient
                .from(CONFIG.tables.profili)
                .select('*, azienda_proprietaria:azienda_proprietaria_id(id, ragione_sociale)')
                .order('nome_profilo', { ascending: true });
            if (profiliError) throw profiliError;
            STATE.data.profili = (profiliData || []).map(normalizeProfiloRow);

            const { data: assocData, error: assocError } = await supabaseClient
                .from(CONFIG.tables.aziendeProfili)
                .select('id, azienda_id, profilo_id, data_associazione, note, azienda:azienda_id(id, ragione_sociale, partita_iva), profilo:profilo_id(id, nome_profilo, tipo_profilo)')
                .order('data_associazione', { ascending: false });
            if (assocError) throw assocError;
            STATE.data.aziendeProfili = (assocData || []).map(normalizeAssociazioneRow);
        }

        async function saveProfilo(event, itemId) {
            if (!canMutateData()) {
                showToast('Permessi insufficienti: sola lettura', 'warning');
                return;
            }
            event.preventDefault();
            const formData = new FormData(event.target);
            const data = {};
            for (const [key, value] of formData.entries()) {
                if (value === '') continue;
                if (['ProtocolloSorSan', 'Attivo'].includes(key)) {
                    data[key] = value === 'true';
                } else {
                    data[key] = value;
                }
            }

            const payload = profiloPayloadFromForm(data);
            if (payload.tipo_profilo === 'Custom' && !payload.azienda_proprietaria_id) {
                showToast('Per un profilo Custom devi selezionare Azienda Proprietaria', 'warning');
                return;
            }

            try {
                if (itemId) {
                    const existing = STATE.data.profili.find(p => p.id == itemId);
                    if (existing?.fields?.TipoProfilo === 'Standard') {
                        throw new Error('I profili Standard non sono modificabili');
                    }
                    const { error } = await supabaseClient
                        .from(CONFIG.tables.profili)
                        .update(payload)
                        .eq('id', itemId);
                    if (error) throw error;
                    showToast('Profilo aggiornato con successo', 'success');
                } else {
                    const { error } = await supabaseClient
                        .from(CONFIG.tables.profili)
                        .insert(payload);
                    if (error) throw error;
                    showToast('Profilo creato con successo', 'success');
                }

                closeModal('profiloModal');
                await renderProfili();
            } catch (error) {
                console.error(error);
                showToast('Errore salvataggio profilo: ' + error.message, 'error');
            }
        }

        async function deleteProfilo(itemId) {
            if (!canMutateData()) {
                showToast('Permessi insufficienti: sola lettura', 'warning');
                return;
            }
            const item = STATE.data.profili.find(p => p.id == itemId);
            if (item?.fields?.TipoProfilo === 'Standard') {
                showToast('I profili Standard non possono essere eliminati', 'warning');
                return;
            }

            if (!confirm('Confermi eliminazione del profilo? Le associazioni e valutazioni correlate saranno rimosse.')) {
                return;
            }

            try {
                const { data: links, error: linksError } = await supabaseClient
                    .from(CONFIG.tables.aziendeProfili)
                    .select('id, azienda_id, profilo_id')
                    .eq('profilo_id', itemId);
                if (linksError) throw linksError;

                for (const link of (links || [])) {
                    const { error: delValErr } = await supabaseClient
                        .from(CONFIG.tables.valutazioniRischio)
                        .delete()
                        .eq('azienda_id', link.azienda_id)
                        .eq('profilo_id', link.profilo_id);
                    if (delValErr) throw delValErr;
                }

                const { error: delLinksErr } = await supabaseClient
                    .from(CONFIG.tables.aziendeProfili)
                    .delete()
                    .eq('profilo_id', itemId);
                if (delLinksErr) throw delLinksErr;

                const { error } = await supabaseClient
                    .from(CONFIG.tables.profili)
                    .delete()
                    .eq('id', itemId);
                if (error) throw error;

                closeModal('profiloModal');
                showToast('Profilo eliminato', 'success');
                await renderProfili();
            } catch (error) {
                console.error(error);
                showToast('Errore eliminazione profilo: ' + error.message, 'error');
            }
        }

        async function associateProfiloAzienda(event) {
            if (!canMutateData()) {
                showToast('Permessi insufficienti: sola lettura', 'warning');
                return;
            }
            event.preventDefault();
            const formData = new FormData(event.target);
            const aziendaId = formData.get('azienda_id');
            const profiloId = formData.get('profilo_id');
            if (!aziendaId || !profiloId) {
                showToast('Seleziona azienda e profilo', 'warning');
                return;
            }

            const alreadyLinked = (STATE.data.aziendeProfili || []).some(ap => ap.azienda_id === aziendaId && ap.profilo_id === profiloId);
            if (alreadyLinked) {
                showToast('Associazione già presente', 'warning');
                return;
            }

            try {
                const { error } = await supabaseClient.rpc('fn_associa_profilo_azienda', {
                    p_azienda_id: aziendaId,
                    p_profilo_id: profiloId,
                    p_user_id: STATE.account?.id || null
                });
                if (error) throw error;
                showToast('Associazione creata e valutazioni generate', 'success');
                await renderProfili();
            } catch (error) {
                console.error(error);
                showToast('Errore associazione: ' + error.message, 'error');
            }
        }

        async function deleteAssociazione(associazioneId) {
            if (!canMutateData()) {
                showToast('Permessi insufficienti: sola lettura', 'warning');
                return;
            }
            const row = (STATE.data.aziendeProfili || []).find(a => a.id == associazioneId);
            if (!row) return;
            if (!confirm('Confermi disassociazione? Verranno eliminate anche le valutazioni correlate.')) return;

            try {
                const { error: delValErr } = await supabaseClient
                    .from(CONFIG.tables.valutazioniRischio)
                    .delete()
                    .eq('azienda_id', row.azienda_id)
                    .eq('profilo_id', row.profilo_id);
                if (delValErr) throw delValErr;

                const { error } = await supabaseClient
                    .from(CONFIG.tables.aziendeProfili)
                    .delete()
                    .eq('id', associazioneId);
                if (error) throw error;

                showToast('Associazione rimossa', 'success');
                await renderProfili();
            } catch (error) {
                console.error(error);
                showToast('Errore disassociazione: ' + error.message, 'error');

        }

        async function loadValutazioniData() {
            await ensureAziendeLoaded();

            const { data: profiliData, error: profiliError } = await supabaseClient
                .from(CONFIG.tables.profili)
                .select('id, nome_profilo, tipo_profilo, attivo')
                .eq('attivo', true)
                .order('nome_profilo', { ascending: true });
            if (profiliError) throw profiliError;
            const uniqueProfili = [];
            const seen = new Set();
            for (const p of (profiliData || [])) {
                // Fix chirurgico: evita duplicati in filtro valutazioni dovuti a seed ripetuti.
                const key = `${p.nome_profilo}::${p.tipo_profilo}`;
                if (seen.has(key)) continue;
                seen.add(key);
                uniqueProfili.push({
                    id: p.id,
                    fields: { NomeProfilo: p.nome_profilo, TipoProfilo: p.tipo_profilo, Attivo: p.attivo }
                });
            }
            STATE.data.profili = uniqueProfili;

            const { data: associazioniData, error: associazioniError } = await supabaseClient
                .from(CONFIG.tables.aziendeProfili)
                .select('azienda_id, profilo_id, profilo:profilo_id(id, nome_profilo, attivo)');
            if (associazioniError) throw associazioniError;
            STATE.data.aziendeProfili = associazioniData || [];

            const { data: testiData, error: testiError } = await supabaseClient
                .from(CONFIG.tables.testiDVR)
                .select('id, titolo_testo, rischio_id, livello, tipo_testo, azienda_origine_id')
                .order('titolo_testo', { ascending: true });
            if (testiError) throw testiError;
            STATE.data.testiDVR = testiData || [];
        }

        function getValutazioniProfiliForAzienda(aziendaId) {
            if (!aziendaId) return STATE.data.profili || [];
            const byLabel = new Map();
            (STATE.data.aziendeProfili || [])
                .filter(ap => ap.azienda_id === aziendaId && ap.profilo?.attivo !== false)
                .forEach(ap => {
                    if (!ap.profilo_id || !ap.profilo?.nome_profilo) return;
                    const nomeProfilo = (ap.profilo.nome_profilo || '').trim();
                    const labelKey = nomeProfilo.toLowerCase();
                    if (byLabel.has(labelKey)) return;
                    byLabel.set(labelKey, {
                        id: labelKey,
                        fields: { NomeProfilo: nomeProfilo }
                    });
                });
            return Array.from(byLabel.values()).sort((a, b) =>
                (a.fields.NomeProfilo || '').localeCompare(b.fields.NomeProfilo || '')
            );
        }

        function updateValutazioniProfiloFilter() {
            const aziendaId = document.getElementById('valutazioniAziendaFilter')?.value || '';
            const profiloSelect = document.getElementById('valutazioniProfiloFilter');
            if (!profiloSelect) return;
            const current = profiloSelect.value || '';
            const profili = getValutazioniProfiliForAzienda(aziendaId);
            profiloSelect.innerHTML = `
                <option value="">— Tutti i profili —</option>
                ${profili.map(p => `<option value="${p.id}">${esc(p.fields.NomeProfilo || '')}</option>`).join('')}
            `;
            if (current && profili.some(p => p.id === current)) {
                profiloSelect.value = current;
            } else {
                profiloSelect.value = '';
            }
        }

        async function loadValutazioniByFilters() {
            const container = document.getElementById('valutazioniListContainer');
            if (!container) return;
            const canWrite = canMutateData();
            const aziendaId = document.getElementById('valutazioniAziendaFilter')?.value;
            const profiloKey = document.getElementById('valutazioniProfiloFilter')?.value;
            const viewMode = document.getElementById('valutazioniViewMode')?.value || 'perAzienda';
            if (!aziendaId) {
                container.innerHTML = `
                    <div class="empty-state" style="padding:20px;">
                        <h3>Filtri incompleti</h3>
                        <p>Seleziona almeno un'azienda.</p>
                    </div>
                `;
                return;
            }
            if (viewMode === 'perProfilo' && !profiloKey) {
                container.innerHTML = `
                    <div class="empty-state" style="padding:20px;">
                        <h3>Vista PerProfilo</h3>
                        <p>Seleziona un profilo per questa vista.</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = '<div class="loading"><div class="spinner"></div>Caricamento valutazioni...</div>';
            let query = supabaseClient
                .from(CONFIG.tables.valutazioniRischio)
                .select(`
                    *,
                    rischio:rischio_id(id, id_rischio, nome_rischio, categoria, macro_categoria),
                    testo_dvr:testo_dvr_id(id, titolo_testo, livello),
                    profilo:profilo_id(id, nome_profilo)
                `)
                .eq('azienda_id', aziendaId);
            const { data, error } = await query.order('created_at', { ascending: true });
            if (error) {
                container.innerHTML = `<div class="card-body" style="color:var(--sp-error);">${esc(error.message)}</div>`;
                return;
            }

            let rows = data || [];
            if (profiloKey) {
                rows = rows.filter(v => ((v.profilo?.nome_profilo || '').trim().toLowerCase() === profiloKey));
            }

            // Ordinamento prioritario: prima i rischi "Presenti", poi indice più alto.
            const statoRank = (stato) => (stato === 'Presente' ? 0 : 1);
            rows = [...rows].sort((a, b) => {
                const s = statoRank(a.stato) - statoRank(b.stato);
                if (s !== 0) return s;
                const ia = a.indice_rischio ?? -1;
                const ib = b.indice_rischio ?? -1;
                if (ib !== ia) return ib - ia;
                const ra = a.rischio?.id_rischio || '';
                const rb = b.rischio?.id_rischio || '';
                return ra.localeCompare(rb);
            });

            STATE.data.valutazioniRischio = rows;
            if (rows.length === 0) {
                container.innerHTML = `
                    <div class="empty-state" style="padding:20px;">
                        <h3>Nessuna valutazione trovata</h3>
                        <p>Associa prima un profilo all'azienda dalla sezione Profili.</p>
                    </div>
                `;
                return;
            }

            const renderGroupedRows = () => {
                if (viewMode === 'perAzienda') {
                    const groups = {};
                    rows.forEach(v => {
                        const macro = v.rischio?.macro_categoria || 'Altro';
                        const prof = v.profilo?.nome_profilo || 'Senza profilo';
                        groups[macro] = groups[macro] || {};
                        groups[macro][prof] = groups[macro][prof] || [];
                        groups[macro][prof].push(v);
                    });
                    return Object.entries(groups).map(([macro, byProf]) => `
                        <tr><td colspan="10"><strong>${esc(macro)}</strong></td></tr>
                        ${Object.entries(byProf).map(([prof, list]) => `
                            <tr><td colspan="10" style="padding-left:24px;"><em>${esc(prof)}</em></td></tr>
                            ${list.map(renderValutazioneRow).join('')}
                        `).join('')}
                    `).join('');
                }
                if (viewMode === 'perProfilo') {
                    const byLevel = {};
                    rows.forEach(v => {
                        const level = v.livello_rischio || 'Trascurabile';
                        byLevel[level] = byLevel[level] || [];
                        byLevel[level].push(v);
                    });
                    return Object.entries(byLevel).map(([level, list]) => `
                        <tr><td colspan="10"><strong>Livello: ${esc(level)}</strong></td></tr>
                        ${list.map(renderValutazioneRow).join('')}
                    `).join('');
                }
                return rows.map(renderValutazioneRow).join('');
            };

            container.innerHTML = `
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Rischio</th>
                            <th>Profilo</th>
                            <th>Stato</th>
                            <th>P</th>
                            <th>G</th>
                            <th>Indice</th>
                            <th>Livello</th>
                            <th>Testo DVR</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody>
                        ${renderGroupedRows()}
                    </tbody>
                </table>
            `;

            function renderValutazioneRow(v) {
                return `
                    <tr>
                        <td>${esc(v.rischio?.id_rischio || '—')}</td>
                        <td>${esc(v.rischio?.nome_rischio || '—')}</td>
                        <td>${esc(v.profilo?.nome_profilo || '—')}</td>
                        <td><span class="badge ${v.stato === 'Presente' ? 'warning' : 'info'}">${esc(v.stato || '—')}</span></td>
                        <td>${v.probabilita ?? '—'}</td>
                        <td>${v.gravita ?? '—'}</td>
                        <td>${v.indice_rischio ?? '—'}</td>
                        <td>${esc(v.livello_rischio || '—')}</td>
                        <td>${esc(v.testo_dvr?.titolo_testo || '—')}</td>
                        <td>
                            <button class="icon-btn" onclick="openValutazioneModal('${v.id}')" title="Compila">✏️</button>
                        </td>
                    </tr>
                `;
            }
        }

            document.querySelectorAll('#valutazioneModal .pg-field').forEach(el => {
                el.style.display = stato === 'Presente' ? '' : 'none';
            });
        }

        async function saveValutazione(event, valutazioneId) {
            if (!canMutateData()) {
                showToast('Permessi insufficienti: sola lettura', 'warning');
                return;
            }
            event.preventDefault();
            const formData = new FormData(event.target);
            const stato = formData.get('stato');
            const probabilita = formData.get('probabilita') ? parseInt(formData.get('probabilita'), 10) : null;
            const gravita = formData.get('gravita') ? parseInt(formData.get('gravita'), 10) : null;
            const testoDvrId = formData.get('testo_dvr_id') || null;
            const note = formData.get('note') || null;

            if (stato === 'Presente' && (!probabilita || !gravita)) {
                showToast('Per stato Presente devi valorizzare P e G', 'warning');
                return;
            }

            const { error } = await supabaseClient.rpc('fn_set_valutazione', {
                p_valutazione_id: valutazioneId,
                p_stato: stato,
                p_probabilita: probabilita,
                p_gravita: gravita,
                p_testo_dvr_id: testoDvrId,
                p_note: note
            });
            if (error) {
                showToast('Errore salvataggio valutazione: ' + error.message, 'error');
                return;
            }

            closeModal('valutazioneModal');
            showToast('Valutazione aggiornata', 'success');
            await loadValutazioniByFilters();
        }

            const { data: rischi, error: rischiError } = await supabaseClient

                .select('id, id_rischio, nome_rischio')
                .eq('attivo', true)
                .order('id_rischio', { ascending: true });
            if (rischiError) throw rischiError;
            STATE.data.rischi = rischi || [];

        async function generateDvrDraft(event) {
            event.preventDefault();
            const formData = new FormData(event.target);
            const aziendaId = formData.get('azienda_id');
            const profiloId = formData.get('profilo_id');

            const { data: azienda, error: azErr } = await supabaseClient
                .from(CONFIG.tables.aziende)
                .select('*')
                .eq('id', aziendaId)
                .single();
            if (azErr) {
                showToast('Errore caricamento azienda: ' + azErr.message, 'error');
                return;
            }

            const { data: profilo, error: prErr } = await supabaseClient
                .from(CONFIG.tables.profili)
                .select('*')
                .eq('id', profiloId)
                .single();
            if (prErr) {
                showToast('Errore caricamento profilo: ' + prErr.message, 'error');
                return;
            }

            const { data: valutazioni, error: vaErr } = await supabaseClient
                .from(CONFIG.tables.valutazioniRischio)
                .select('*, rischio:rischio_id(id_rischio, nome_rischio), testo_dvr:testo_dvr_id(titolo_testo, testo_valutazione)')
                .eq('azienda_id', aziendaId)
                .eq('profilo_id', profiloId)
                .order('created_at', { ascending: true });
            if (vaErr) {
                showToast('Errore caricamento valutazioni: ' + vaErr.message, 'error');
                return;
            }

            const { data: rilevamenti, error: riErr } = await supabaseClient
                .from(CONFIG.tables.rilevamentiAmbientali)
                .select('*, tipo_rilevamento:tipo_rilevamento_id(nome_tipo)')
                .eq('azienda_id', aziendaId)
                .order('data_rilevamento', { ascending: false });
            if (riErr) {
                showToast('Errore caricamento rilevamenti: ' + riErr.message, 'error');
                return;
            }

            const html = `
<!doctype html>
<html lang="it"><head><meta charset="utf-8"><title>DVR_${esc(azienda.partita_iva)}</title>
<style>body{font-family:Arial,sans-serif;padding:24px;}table{width:100%;border-collapse:collapse;margin-top:12px;}th,td{border:1px solid #ddd;padding:6px;font-size:12px;}h1,h2{margin:0 0 8px 0;}</style>
</head><body>
<h1>DVR - ${esc(azienda.ragione_sociale)}</h1>
<p><strong>P.IVA:</strong> ${esc(azienda.partita_iva)} | <strong>Profilo:</strong> ${esc(profilo.nome_profilo)}</p>
<h2>Valutazioni Rischio</h2>
<table><thead><tr><th>ID</th><th>Rischio</th><th>Stato</th><th>P</th><th>G</th><th>Indice</th><th>Livello</th><th>Testo</th></tr></thead><tbody>
${(valutazioni || []).map(v => `<tr><td>${esc(v.rischio?.id_rischio || '')}</td><td>${esc(v.rischio?.nome_rischio || '')}</td><td>${esc(v.stato || '')}</td><td>${v.probabilita ?? ''}</td><td>${v.gravita ?? ''}</td><td>${v.indice_rischio ?? ''}</td><td>${esc(v.livello_rischio || '')}</td><td>${esc(v.testo_dvr?.testo_valutazione || v.testo_valutazione || '')}</td></tr>`).join('')}
</tbody></table>
<h2>Rilevamenti Ambientali</h2>
<table><thead><tr><th>Tipo</th><th>Valore</th><th>Limite</th><th>Esito</th><th>Data</th></tr></thead><tbody>
${(rilevamenti || []).map(r => `<tr><td>${esc(r.tipo_rilevamento?.nome_tipo || '')}</td><td>${r.valore_misurato ?? ''} ${esc(r.unita_misura || '')}</td><td>${r.limite_legge_applicato ?? ''}</td><td>${esc(r.esito || '')}</td><td>${esc(formatDateTimeForDisplay(r.data_rilevamento))}</td></tr>`).join('')}
</tbody></table>
</body></html>`;

            const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `DVR_${azienda.partita_iva}_${new Date().toISOString().slice(0, 10)}.html`;
            document.body.appendChild(a);
            a.click();
            a.remove();
            URL.revokeObjectURL(url);
            showToast('Bozza DVR generata', 'success');
        }

        async function saveRischio(event, itemId) {
            if (!canMutateData()) {
                showToast('Permessi insufficienti: sola lettura', 'warning');
                return;
            }
            event.preventDefault();
            const formData = new FormData(event.target);
            const payload = {
                id_rischio: formData.get('id_rischio'),
                nome_rischio: formData.get('nome_rischio'),
                categoria: formData.get('categoria'),
                macro_categoria: formData.get('macro_categoria'),
                titolo_normativo: formData.get('titolo_normativo') || null,
                normativa_rif: formData.get('normativa_rif') || null,
                descrizione: formData.get('descrizione') || null,
                attivo: formData.get('attivo') === 'true',
                ordine: formData.get('ordine') ? parseInt(formData.get('ordine'), 10) : null
            };

            let error;
            if (itemId) {
                ({ error } = await supabaseClient
                    .from(CONFIG.tables.catalogoRischi)
                    .update(payload)
                    .eq('id', itemId));
            } else {
                ({ error } = await supabaseClient
                    .from(CONFIG.tables.catalogoRischi)
                    .insert(payload));
            }

            if (error) {
                showToast('Errore salvataggio rischio: ' + error.message, 'error');
                return;
            }

            closeModal('rischioModal');
            showToast('Rischio salvato', 'success');
            await renderCatalogoRischi();
        }

                <div class="card">
                    <div class="card-body" style="padding:0;">
                        ${(data || []).length === 0 ? `
                            <div class="empty-state"><h3>Nessun utente trovato</h3></div>
                        ` : `
                            <table class="data-table">
                                <thead>
                                    <tr>
                                        <th>Email</th>
                                        <th>Nome</th>
                                        <th>Ruolo</th>
                                        <th>Attivo</th>
                                        <th></th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${(data || []).map(u => `
                                        <tr>
                                            <td>${esc(u.email || '—')}</td>
                                            <td>${esc(u.full_name || '—')}</td>
                                            <td>
                                                <select id="role_${u.id}">
                                                    <option value="viewer" ${u.role === 'viewer' ? 'selected' : ''}>viewer</option>
                                                    <option value="editor" ${u.role === 'editor' ? 'selected' : ''}>editor</option>
                                                    <option value="rspp" ${u.role === 'rspp' ? 'selected' : ''}>rspp</option>
                                                    <option value="admin" ${u.role === 'admin' ? 'selected' : ''}>admin</option>
                                                </select>
                                            </td>
                                            <td>
                                                <select id="active_${u.id}">
                                                    <option value="true" ${u.is_active ? 'selected' : ''}>Sì</option>
                                                    <option value="false" ${!u.is_active ? 'selected' : ''}>No</option>
                                                </select>
                                            </td>
                                            <td>
                                                <button class="btn" onclick="saveUserRole('${u.id}')">Salva</button>
                                            </td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        `}
                    </div>
                </div>
            `;
        }

        async function saveUserRole(userId) {
            const roleEl = document.getElementById(`role_${userId}`);
            const activeEl = document.getElementById(`active_${userId}`);
            if (!roleEl || !activeEl) return;

            const payload = {
                role: roleEl.value,
                is_active: activeEl.value === 'true'
            };

            const { error } = await supabaseClient
                .from('profiles')
                .update(payload)
                .eq('id', userId);
            if (error) {
                showToast('Errore aggiornamento utente: ' + error.message, 'error');
                return;
            }

            if (STATE.account?.id === userId) {
                await loadCurrentProfile();
                applyRoleToNavigation();
            }

            showToast('Utente aggiornato', 'success');
            await renderAdminUsers();
        }
        
        // ════════════════════════════════════════════════════════════════
        // UTILITY
        // ════════════════════════════════════════════════════════════════
        
        function esc(str) {
            if (str === null || str === undefined) return '';
            return String(str).replace(/[<>"']/g, c => ({
                '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
            }[c]));
        }
        
        function formatDateForInput(dateStr) {
            if (!dateStr) return '';
            const d = new Date(dateStr);
            if (isNaN(d.getTime())) return '';
            return d.toISOString().split('T')[0];
        }

        function formatDateTimeForInput(dateStr) {
            if (!dateStr) return '';
            const d = new Date(dateStr);
            if (isNaN(d.getTime())) return '';
            return d.toISOString().slice(0, 16);
        }

        function formatDateTimeForDisplay(dateStr) {
            if (!dateStr) return '';
            const d = new Date(dateStr);
            if (isNaN(d.getTime())) return '';
            return d.toLocaleString('it-IT');
        }
        
        function closeModal(modalId) {
            const modal = document.getElementById(modalId);
            if (!modal) return;
            modal.classList.remove('show');
            setTimeout(() => modal.remove(), 200);
        }
        
        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `<span>${esc(message)}</span>`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 200);
            }, 4000);
        }
        
        // ════════════════════════════════════════════════════════════════
        // BOOTSTRAP
        // ════════════════════════════════════════════════════════════════
        
        async function bootstrap() {
            const { data: authData, error } = await supabaseClient.auth.getSession();
            if (error) {
                console.error(error);
                return;
            }

            if (authData?.session?.user) {
                STATE.account = authData.session.user;
                await initApp();
            }

            supabaseClient.auth.onAuthStateChange(async (event, session) => {
                if (session?.user && !STATE.account) {
                    STATE.account = session.user;
                    await initApp();
                }
                if (event === 'SIGNED_OUT') {
                    STATE.account = null;
                    location.reload();
                }
            });
        }
        
        bootstrap();
        
    </script>
</body>
</html>
